<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Sign Up | Atlas Fund Capital</title>
  <link href="/https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, #0a0e27 0%, #111640 100%); padding: 24px; }
    .auth-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 48px 40px; max-width: 460px; width: 100%; color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .auth-card h2 { color: white; text-align: center; margin-bottom: 8px; }
    .auth-card .sub { text-align: center; color: rgba(255,255,255,0.55); margin-bottom: 32px; font-size: 0.92rem; }
    .auth-card label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.75); margin-bottom: 6px; }
    .auth-card input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 18px; transition: all 0.3s; }
    .auth-card input:focus { outline: none; border-color: rgba(201,168,76,0.5); box-shadow: 0 0 0 4px rgba(201,168,76,0.08); }
    .auth-card .btn-gold { width: 100%; padding: 16px; font-size: 1rem; border-radius: 14px; background: linear-gradient(135deg, #d4b44c 0%, #c9a84c 40%, #b89230 100%); box-shadow: 0 4px 20px rgba(201,168,76,0.35); border: none; cursor: pointer; font-weight: 700; color: #0a0e27; margin-top: 8px; }
    .auth-card .btn-gold:hover { background: linear-gradient(135deg, #e0c258 0%, #d4b44c 40%, #c49c34 100%); transform: translateY(-2px); }
    .auth-card .link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: rgba(255,255,255,0.5); }
    .auth-card .link a { color: var(--accent); font-weight: 600; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.88rem; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Become a Partner</h2>
      <p class="sub">Earn $100 per qualified lead. Get paid weekly.</p>
      {% if messages %}
        {% for message in messages %}
          <div class="alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="John Smith" required>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="partner@example.com" required>
        <label for="company_name">Company (optional)</label>
        <input type="text" id="company_name" name="company_name" placeholder="Your Business, Inc.">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" required>
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Min 8 characters" required>
        <button type="submit" class="btn-gold">Create Account</button>
      </form>
      <p class="link">Already a partner? <a href="/partner/login/">Sign in</a></p>
    </div>
  </div>
</body>
</html>
